name: Build and validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Ensure ImageMagick
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi
      - name: Install
        run: npm ci
      - name: Audit, build, and validate
        run: npm run check
      - name: Compare with the live release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run release:diff
      - name: Upload changed URL manifest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: changed-urls
          path: reports/changed-urls.json
          if-no-files-found: error
          retention-days: 7
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
  notify-indexnow:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Download changed URL manifest
        uses: actions/download-artifact@v8
        with:
          name: changed-urls
          path: reports
      - name: Notify IndexNow only about changed URLs
        run: node scripts/submit-indexnow.mjs --urls-file reports/changed-urls.json
