<!doctype html><html lang="{{lang}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{metaTitle}}</title><meta name="description" content="{{description}}"><meta name="robots" content="index,follow"><link rel="canonical" href="{{canonical}}">{{hreflang}}<meta property="og:type" content="website"><meta property="og:title" content="{{metaTitle}}"><meta property="og:description" content="{{description}}"><meta property="og:url" content="{{canonical}}"><meta property="og:image" content="{{ogImage}}"><link rel="stylesheet" href="/assets/css/style.css?v=5.3.0"><script type="application/ld+json">{{structuredData}}</script><script defer src="/assets/js/analytics-v4.8.0.js"></script><script defer src="/assets/js/main-v4.7.0.js"></script><script defer src="/assets/js/product-diagnosis-v3.1.0.js"></script></head><body>{{header}}<main id="main"><section class="section compare-hero"><div class="container"><span class="eyebrow">{{eyebrow}}</span><h1>{{title}}</h1><p class="hero-copy">{{lead}}</p></div></section><section class="section section-white"><div class="container diagnosis-app" data-diagnosis data-lang="{{lang}}"><form data-diagnosis-form><fieldset><legend>{{goalLabel}}</legend>{{goalOptions}}</fieldset><fieldset><legend>{{budgetLabel}}</legend>{{budgetOptions}}</fieldset><fieldset><legend>{{priorityLabel}}</legend>{{priorityOptions}}</fieldset><div class="diagnosis-switches">{{switches}}</div><button class="btn btn-primary" type="submit">{{submitLabel}}</button><button class="btn btn-secondary" type="reset">{{resetLabel}}</button></form><section data-diagnosis-results hidden><h2>{{resultTitle}}</h2><p>{{resultLead}}</p><div class="comparison-database" data-diagnosis-grid></div></section><script type="application/json" data-product-catalog>{{catalog}}</script></div></section></main>{{footer}}</body></html>
