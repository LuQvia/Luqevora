<a class="skip-link" href="#main">{{skipLabel}}</a>
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/{{lang}}/">
      <img alt="" decoding="async" height="384" src="/assets/images/logo-icon.webp" width="384">
      <span>Luqevora.com</span>
    </a>
    <button aria-controls="primary-navigation" aria-expanded="false" aria-label="{{menuLabel}}" class="menu-button" type="button">
      <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
    </button>
    <nav aria-label="{{navLabel}}" class="main-nav" id="primary-navigation">
      {{navigation}}
      <a class="lang-link" href="{{alternateUrl}}" lang="{{alternateLang}}">{{alternateLabel}}</a>
    </nav>
  </div>
</header>
